<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="LUMINA — Tienda de electrónica premium" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>LUMINA Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">LUMINA</div>
    <button class="cart-btn" id="cartBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <p class="hero-sub">Colección 2025</p>
      <h1 class="hero-title">TEC<br>NOLO<br>GÍA<br>VIVA</h1>
      <p class="hero-desc">Dispositivos que transforman tu forma de crear, comunicar y conectar.</p>
    </div>
    <div class="hero-glow"></div>
  </section>

  <!-- PRODUCTOS -->
  <section class="products-section">
    <h2 class="section-title">Productos</h2>
    <div class="products-grid" id="productsGrid"></div>
  </section>

  <!-- CARRITO SIDEBAR -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>Tu Carrito</h3>
      <button class="close-cart" id="closeCart">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="cart-empty">Tu carrito está vacío.</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total">
        Total: <span id="cartTotal">$0.00</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn">
        Pagar con tarjeta →
      </button>
    </div>
  </aside>

  <!-- MODAL ÉXITO -->
  <div class="modal-overlay" id="successModal" style="display:none">
    <div class="modal">
      <div class="modal-icon">✓</div>
      <h3>¡Pago exitoso!</h3>
      <p>Tu pedido ha sido procesado correctamente.</p>
      <button class="modal-btn" id="modalClose">Continuar comprando</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
